<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Football field top-down view -->
  <rect width="1200" height="400" fill="#2d6a2d"/>
  <!-- Yard lines -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="210" y1="0" x2="210" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="430" y1="0" x2="430" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="770" y1="0" x2="770" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/>
    <line x1="990" y1="0" x2="990" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>
  <!-- End zones -->
  <rect x="0" y="0" width="100" height="400" fill="rgba(255,255,255,0.08)"/>
  <rect x="1100" y="0" width="100" height="400" fill="rgba(255,255,255,0.08)"/>
  <!-- Hash marks -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
    <line x1="210" y1="150" x2="210" y2="165"/>
    <line x1="320" y1="150" x2="320" y2="165"/>
    <line x1="430" y1="150" x2="430" y2="165"/>
    <line x1="540" y1="150" x2="540" y2="165"/>
    <line x1="660" y1="150" x2="660" y2="165"/>
    <line x1="770" y1="150" x2="770" y2="165"/>
    <line x1="880" y1="150" x2="880" y2="165"/>
    <line x1="990" y1="150" x2="990" y2="165"/>
    <line x1="210" y1="235" x2="210" y2="250"/>
    <line x1="320" y1="235" x2="320" y2="250"/>
    <line x1="430" y1="235" x2="430" y2="250"/>
    <line x1="540" y1="235" x2="540" y2="250"/>
    <line x1="660" y1="235" x2="660" y2="250"/>
    <line x1="770" y1="235" x2="770" y2="250"/>
    <line x1="880" y1="235" x2="880" y2="250"/>
    <line x1="990" y1="235" x2="990" y2="250"/>
  </g>
  <!-- Sidelines -->
  <rect x="0" y="0" width="1200" height="8" fill="rgba(255,255,255,0.4)"/>
  <rect x="0" y="392" width="1200" height="8" fill="rgba(255,255,255,0.4)"/>
</svg>
