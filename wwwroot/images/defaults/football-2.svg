<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Dark stadium atmosphere -->
  <defs>
    <radialGradient id="stadGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#stadGrad)"/>
  <!-- Field lines perspective -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none">
    <line x1="0" y1="380" x2="1200" y2="380"/>
    <line x1="120" y1="340" x2="1080" y2="340"/>
    <line x1="220" y1="305" x2="980" y2="305"/>
    <line x1="310" y1="275" x2="890" y2="275"/>
    <line x1="390" y1="248" x2="810" y2="248"/>
    <line x1="460" y1="224" x2="740" y2="224"/>
    <line x1="525" y1="203" x2="675" y2="203"/>
  </g>
  <!-- Vertical lines perspective -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none">
    <line x1="600" y1="160" x2="0" y2="400"/>
    <line x1="600" y1="160" x2="150" y2="400"/>
    <line x1="600" y1="160" x2="300" y2="400"/>
    <line x1="600" y1="160" x2="450" y2="400"/>
    <line x1="600" y1="160" x2="600" y2="400"/>
    <line x1="600" y1="160" x2="750" y2="400"/>
    <line x1="600" y1="160" x2="900" y2="400"/>
    <line x1="600" y1="160" x2="1050" y2="400"/>
    <line x1="600" y1="160" x2="1200" y2="400"/>
  </g>
  <!-- Goal post -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="4" fill="none">
    <line x1="600" y1="30" x2="600" y2="155"/>
    <line x1="545" y1="55" x2="655" y2="55"/>
    <line x1="545" y1="55" x2="545" y2="30"/>
    <line x1="655" y1="55" x2="655" y2="30"/>
  </g>
  <!-- Spotlight flares -->
  <circle cx="150" cy="30" r="4" fill="rgba(255,255,200,0.8)"/>
  <circle cx="1050" cy="30" r="4" fill="rgba(255,255,200,0.8)"/>
  <circle cx="80" cy="50" r="3" fill="rgba(255,255,200,0.6)"/>
  <circle cx="1120" cy="50" r="3" fill="rgba(255,255,200,0.6)"/>
</svg>
